<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .heart { fill: none; stroke: #042E3C; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .leaf { fill: #1D694E; }
      .leaf-stem { fill: none; stroke: #FFFFFF; stroke-width: 2.5; stroke-linecap: round; }
      .dumbbell-bar { fill: none; stroke: #12574A; stroke-width: 6; stroke-linecap: round; }
      .dumbbell-weight { fill: #12574A; stroke: #042E3C; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .dumbbell-highlight { fill: none; stroke: #1D694E; stroke-width: 2; }
    </style>
  </defs>

  <!-- Heart Outline Top Left and Left -->
  <path class="heart" d="M 50 25 C 43 14 26 12 17 22 C 6 34 11 51 22 63" />
  
  <!-- Heart Outline Bottom -->
  <path class="heart" d="M 28 72 L 48 90 C 49 91 51 91 52 90 L 76 68 C 82 62 86 54 87 46" />

  <!-- Leaf -->
  <path class="leaf" d="M 94 8 C 84 10 70 24 68 37 C 67 42 67 46 72 45 C 80 43 93 30 95 18 C 96 14 95 10 94 8 Z" />
  <!-- Leaf stem -->
  <path class="leaf-stem" d="M 70 41 C 77 34 83 26 89 17" />

  <!-- Dumbbell Bar (Diagonal) -->
  <path class="dumbbell-bar" d="M 22 55 L 75 40" />

  <!-- Left Inner Weight -->
  <rect x="25" y="44" width="8" height="24" rx="2" transform="rotate(-15 29 56)" class="dumbbell-weight" />
  <!-- Left Outer Weight -->
  <rect x="15" y="48" width="6" height="20" rx="1.5" transform="rotate(-15 18 58)" class="dumbbell-weight" />

  <!-- Right Inner Weight -->
  <rect x="65" y="32" width="8" height="24" rx="2" transform="rotate(-15 69 44)" class="dumbbell-weight" />
  <!-- Right Outer Weight -->
  <rect x="76" y="33" width="6" height="20" rx="1.5" transform="rotate(-15 79 43)" class="dumbbell-weight" />

</svg>